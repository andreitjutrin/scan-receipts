AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: >
  Grocery Receipt Scanner v4
  ~$1.30/month at 100 receipts.
  Hybrid store-scoped + global mapping with updated confidence thresholds.
  S3 event triggers processor automatically (no manual trigger).
  Cost safeguards: process_count limit, Lambda concurrency cap, SNS alerts.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]

  AlertEmail:
    Type: String
    Default: "your@email.com"
    Description: Email address for cost/error alerts (process limit breaches)

  CognitoCallbackUrl:
    Type: String
    Default: "https://placeholder.cloudfront.net"
    Description: CloudFront URL — update after first deploy and redeploy

  GoogleSheetId:
    Type: String
    Default: ""
    Description: Google Sheet ID for Looker Studio sync (prod only)

Conditions:
  IsProd: !Equals [!Ref Environment, "prod"]

Globals:
  Function:
    Runtime: python3.12
    Architectures: [x86_64]
    MemorySize: 256
    Timeout: 30
    Environment:
      Variables:
        ENVIRONMENT:      !Ref Environment
        RECEIPTS_TABLE:   !Ref ReceiptsTable
        ITEMS_TABLE:      !Ref ItemsTable
        MAPPINGS_TABLE:   !Ref MappingsTable
        CATEGORIES_TABLE:  !Ref CategoriesTable
        RETAILERS_TABLE:   !Ref RetailersTable
        ITEM_TYPES_TABLE:  !Ref ItemTypesTable
        IMAGES_BUCKET:    !Ref ImagesBucket
        EXPORTS_BUCKET:   !Ref ExportsBucket
        STARLING_TABLE:   !Ref StarlingTable
        ALERT_TOPIC_ARN:   !Ref AlertTopic
        LOG_LEVEL:         INFO
        FRONTEND_ORIGIN:   !Ref CognitoCallbackUrl
        # Confidence thresholds — matches models.py constants
        THRESHOLD_SILENT: "0.92"   # >= this: auto-categorise silently
        THRESHOLD_REVIEW: "0.75"   # >= this: auto-categorise, flag for review
        THRESHOLD_GUESS:  "0.50"   # >= this: flag review, show best guess
        MAX_PROCESS_COUNT: "3"     # max Textract calls per receipt

Resources:

  # ---------------------------------------------------------------------------
  # SNS ALERT TOPIC
  # Email sent when: process_count limit reached, unexpected Lambda errors
  # ---------------------------------------------------------------------------
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "grocery-alerts-${Environment}"
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlertEmail

  # ---------------------------------------------------------------------------
  # S3 BUCKETS
  # ---------------------------------------------------------------------------
  ImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "grocery-images-${Environment}-${AWS::AccountId}"
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, PUT]
            AllowedOrigins: ["*"]
            MaxAge: 3600
      PublicAccessBlockConfiguration:
        BlockPublicAcls:        true
        BlockPublicPolicy:      true
        IgnorePublicAcls:       true
        RestrictPublicBuckets:  true
      # NOTE: S3 event notification is configured separately after first deploy
      # using: aws s3api put-bucket-notification-configuration
      # This avoids a chicken-and-egg problem where S3 needs the Lambda to exist
      # to validate the notification, but Lambda needs to be deployed first.
      # No versioning needed on images — each receipt has a unique filename
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldImages
            Status: Enabled
            ExpirationInDays: 365   # kept for reprocessing, deleted after 1 year

  ExportsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "grocery-exports-${Environment}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, PUT]
            AllowedOrigins: ["*"]
            MaxAge: 3600
      PublicAccessBlockConfiguration:
        BlockPublicAcls:        true
        BlockPublicPolicy:      true
        IgnorePublicAcls:       true
        RestrictPublicBuckets:  true
      # Versioning ON — every master.xlsx write keeps previous version
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldBackups
            Status: Enabled
            # Delete dated backup files after 30 days
            NoncurrentVersionExpirationInDays: 30
            ExpirationInDays: 90   # keep named backups for 90 days

  # ---------------------------------------------------------------------------
  # COMMON LAYER — shared dynamo_client.py, models.py, and dependencies
  # ---------------------------------------------------------------------------
  CommonLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "grocery-common-${Environment}"
      ContentUri: ../lambdas/common/
      CompatibleRuntimes: [python3.12]
      CompatibleArchitectures: [x86_64]
    Metadata:
      BuildMethod: python3.12

  # Allow S3 to invoke the processor Lambda.
  # FunctionName uses !Sub with account/region to avoid circular dependency.
  # (ImagesBucket → ProcessorFunction → ImagesBucket would be circular if we
  #  used !GetAtt ProcessorFunction.Arn here while the bucket also references
  #  the Lambda via its NotificationConfiguration.)
  ImagesBucketPermission:
    Type: AWS::Lambda::Permission
    DependsOn: ProcessorFunction
    Properties:
      FunctionName: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:grocery-processor-${Environment}"
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub "arn:aws:s3:::grocery-images-${Environment}-${AWS::AccountId}"

  # ---------------------------------------------------------------------------
  # DYNAMODB TABLES
  # ---------------------------------------------------------------------------

  # One record per receipt
  ReceiptsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "grocery-receipts-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: receipt_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: receipt_date
          AttributeType: S
      KeySchema:
        - AttributeName: receipt_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: UserDateIndex
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: receipt_date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # Line items per receipt
  ItemsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "grocery-items-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: receipt_id
          AttributeType: S
        - AttributeName: item_seq
          AttributeType: S
      KeySchema:
        - AttributeName: receipt_id
          KeyType: HASH
        - AttributeName: item_seq
          KeyType: RANGE

  # Hybrid category mappings
  # PK: mapping_key = "store_id#normalized_name"
  # GSI: store_id → load all store mappings at cold start
  MappingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: mapping_key
          AttributeType: S
        - AttributeName: store_id
          AttributeType: S
      KeySchema:
        - AttributeName: mapping_key
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: StoreIndex
          KeySchema:
            - AttributeName: store_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  CategoriesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "grocery-categories-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: category_id
          AttributeType: S
      KeySchema:
        - AttributeName: category_id
          KeyType: HASH

  ItemTypesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "grocery-item-types-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: item_type_id
          AttributeType: S
      KeySchema:
        - AttributeName: item_type_id
          KeyType: HASH

  StarlingTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "grocery-starling-txns-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: month
          AttributeType: S
        - AttributeName: transaction_id
          AttributeType: S
      KeySchema:
        - AttributeName: month
          KeyType: HASH
        - AttributeName: transaction_id
          KeyType: RANGE

  RetailersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "grocery-retailers-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: retailer_id
          AttributeType: S
      KeySchema:
        - AttributeName: retailer_id
          KeyType: HASH

  # ---------------------------------------------------------------------------
  # IAM ROLE
  # ---------------------------------------------------------------------------
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "grocery-scanner-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: GroceryScannerAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:DeleteObject, s3:CopyObject]
                Resource:
                  - !Sub "${ImagesBucket.Arn}/*"
                  - !Sub "${ExportsBucket.Arn}/*"
              - Effect: Allow
                Action: [s3:ListBucket, s3:ListBucketVersions]
                Resource:
                  - !GetAtt ImagesBucket.Arn
                  - !GetAtt ExportsBucket.Arn
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                Resource:
                  - !GetAtt ReceiptsTable.Arn
                  - !Sub "${ReceiptsTable.Arn}/index/*"
                  - !GetAtt ItemsTable.Arn
                  - !GetAtt MappingsTable.Arn
                  - !Sub "${MappingsTable.Arn}/index/*"
                  - !GetAtt CategoriesTable.Arn
                  - !GetAtt RetailersTable.Arn
                  - !GetAtt ItemTypesTable.Arn
                  - !GetAtt StarlingTable.Arn
              - Effect: Allow
                Action: textract:AnalyzeExpense
                Resource: "*"
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref AlertTopic
              - Effect: Allow
                Action: ssm:GetParameter
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/grocery-scanner-google-credentials"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/grocery-scanner/${Environment}/starling-token"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/grocery-scanner/${Environment}/starling-spaces"
              - Effect: Allow
                Action: kms:Decrypt
                Resource: "*"

  # ---------------------------------------------------------------------------
  # LAMBDA FUNCTIONS
  # ---------------------------------------------------------------------------

  UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "grocery-upload-${Environment}"
      CodeUri: ../lambdas/receipt_upload/
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaRole.Arn
      Layers:
        - !Ref CommonLayer
      Description: >
        Creates pending receipt record, returns presigned S3 URL.
        User selects store_id before calling this.
      Environment:
        Variables:
          PRESIGNED_EXPIRY: "300"   # presigned URL expires in 5 minutes
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /receipts/upload-url
            Method: POST

  UploadLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/grocery-upload-${Environment}"
      RetentionInDays: 14

  ProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "grocery-processor-${Environment}"
      CodeUri: ../lambdas/receipt_processor/
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaRole.Arn
      Layers:
        - !Ref CommonLayer
      Description: >
        Triggered automatically by S3 event when photo lands.
        Runs Textract, hybrid matching, saves items, updates Excel.
        Safeguard: max 2 concurrent, max 3 Textract calls per receipt.
      MemorySize: 512
      Timeout: 120
      Events:
        # S3 trigger is configured on ImagesBucket.NotificationConfiguration
        # (not here) to avoid a circular dependency between the bucket and
        # this function. The ImagesBucketPermission resource grants S3 the
        # right to invoke this Lambda.
        # Available via API for manual reprocessing:
        ReprocessApi:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /receipts/{receipt_id}/reprocess
            Method: POST

  ProcessorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/grocery-processor-${Environment}"
      RetentionInDays: 14

  ReceiptsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "grocery-receipts-${Environment}"
      CodeUri: ../lambdas/receipt_confirm/
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaRole.Arn
      Layers:
        - !Ref CommonLayer
      Description: CRUD for receipts and items, saves user corrections to mappings
      Events:
        GetReceiptsSummary:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /receipts/summary
            Method: GET
        ListReceipts:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /receipts
            Method: GET
        GetReceipt:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /receipts/{receipt_id}
            Method: GET
        ConfirmReceipt:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /receipts/{receipt_id}/confirm
            Method: POST
        DeleteReceipt:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /receipts/{receipt_id}
            Method: DELETE
        DeleteItem:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /receipts/{receipt_id}/items/{item_seq}
            Method: DELETE
        PatchItem:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /receipts/{receipt_id}/items/{item_seq}
            Method: PATCH
        UpdateReceiptTotal:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /receipts/{receipt_id}/total
            Method: PATCH
        FlagItemExpense:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /receipts/{receipt_id}/items/{item_seq}/expense
            Method: POST
        SplitItem:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /receipts/{receipt_id}/items/{item_seq}/split
            Method: POST
        ListExpenses:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /expenses
            Method: GET

  ReceiptsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/grocery-receipts-${Environment}"
      RetentionInDays: 14

  ReferenceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "grocery-reference-${Environment}"
      CodeUri: ../lambdas/category_trainer/
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaRole.Arn
      Layers:
        - !Ref CommonLayer
      Description: Categories and retailers reference data — GET lists, POST new store
      Events:
        GetCategories:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /categories
            Method: GET
        GetRetailers:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /retailers
            Method: GET
        AddRetailer:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /retailers
            Method: POST
        GetItemTypes:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /item-types
            Method: GET
        AddItemType:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /item-types
            Method: POST
        UpdateItemType:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /item-types/{item_type_id}
            Method: PUT
        GetMappings:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /mappings
            Method: GET

  ReferenceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/grocery-reference-${Environment}"
      RetentionInDays: 14

  AdminFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "grocery-admin-${Environment}"
      CodeUri: ../lambdas/admin/
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaRole.Arn
      Layers:
        - !Ref CommonLayer
      Description: Admin endpoints — list backups, restore backup
      Events:
        ListBackups:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /admin/backups
            Method: GET
        RestoreBackup:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /admin/restore-backup
            Method: POST

  AdminLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/grocery-admin-${Environment}"
      RetentionInDays: 14

  StarlingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "grocery-starling-${Environment}"
      CodeUri: ../lambdas/starling/
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaRole.Arn
      Layers:
        - !Ref CommonLayer
      Timeout: 60
      Description: Starling Bank sync — fetch transactions, match receipts, write Excel
      Events:
        SyncStarling:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /starling/sync
            Method: POST
        GetStarlingTransactions:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /starling/transactions
            Method: GET
        GetStarlingExport:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /starling/export
            Method: GET
        GetStarlingReceipts:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /starling/receipts
            Method: GET
        PostStarlingMatch:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /starling/match
            Method: POST
        DeleteStarlingMatch:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /starling/match
            Method: DELETE

  StarlingLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/grocery-starling-${Environment}"
      RetentionInDays: 14

  # ---------------------------------------------------------------------------
  # API GATEWAY
  # ---------------------------------------------------------------------------
  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "grocery-api-${Environment}"
      StageName: !Ref Environment
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt CognitoUserPool.Arn
            Identity:
              Header: Authorization
      Cors:
        AllowMethods: "'GET,POST,DELETE,PATCH,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin:  !Sub "'${CognitoCallbackUrl}'"
      # GatewayResponses injects CORS headers onto API Gateway error responses
      # (e.g. 401/403 on failed Cognito auth, 4xx/5xx errors).
      # Without this, the browser sees a network error instead of the real status code
      # because the error response arrives without Access-Control-Allow-Origin.
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: !Sub "'${CognitoCallbackUrl}'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              Access-Control-Allow-Methods: "'GET,POST,DELETE,PATCH,OPTIONS'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: !Sub "'${CognitoCallbackUrl}'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              Access-Control-Allow-Methods: "'GET,POST,DELETE,PATCH,OPTIONS'"

  # ---------------------------------------------------------------------------
  # COGNITO — user auth (admin-only signup, PKCE flow)
  # ---------------------------------------------------------------------------
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "grocery-scanner-${Environment}"
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "grocery-scanner-app-${Environment}"
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      AllowedOAuthFlows: [code]
      AllowedOAuthScopes: [openid, email, profile]
      AllowedOAuthFlowsUserPoolClient: true
      ExplicitAuthFlows: [ALLOW_REFRESH_TOKEN_AUTH]
      AccessTokenValidity: 24
      IdTokenValidity: 24
      RefreshTokenValidity: 365
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      CallbackURLs: [!Ref CognitoCallbackUrl]
      LogoutURLs: [!Ref CognitoCallbackUrl]
      SupportedIdentityProviders: [COGNITO]
      PreventUserExistenceErrors: ENABLED

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "grocery-${Environment}-${AWS::AccountId}"
      UserPoolId: !Ref CognitoUserPool

  # ---------------------------------------------------------------------------
  # FRONTEND HOSTING — S3 (private) + CloudFront OAC
  # ---------------------------------------------------------------------------
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "grocery-frontend-${Environment}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls:       true
        BlockPublicPolicy:     true
        IgnorePublicAcls:      true
        RestrictPublicBuckets: true

  FrontendSecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "grocery-security-headers-${Environment}"
        SecurityHeadersConfig:
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 63072000   # 2 years
            IncludeSubdomains: true
            Override: true
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          ContentSecurityPolicy:
            ContentSecurityPolicy: !Sub >-
              default-src 'none';
              script-src 'self' 'unsafe-inline';
              style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
              font-src 'self' https://fonts.gstatic.com;
              img-src 'self' data: blob: https://*.amazonaws.com;
              connect-src 'self' https://*.execute-api.${AWS::Region}.amazonaws.com https://cognito-idp.${AWS::Region}.amazonaws.com https://*.amazoncognito.com https://*.s3.${AWS::Region}.amazonaws.com;
              frame-ancestors 'none';
            Override: true

  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "grocery-frontend-oac-${Environment}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        DefaultRootObject: receipt-scanner-app.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !GetAtt FrontendOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          ResponseHeadersPolicyId: !Ref FrontendSecurityHeadersPolicy
          AllowedMethods: [GET, HEAD]
        Enabled: true
        HttpVersion: http2
        Comment: !Sub "Grocery Scanner ${Environment}"

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${FrontendBucket}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

  # ---------------------------------------------------------------------------
  # SHEET SYNC — Google Sheets mirror (prod only)
  # S3 notification configured separately via CLI after deploy (same pattern
  # as ImagesBucket) to avoid chicken-and-egg CloudFormation dependency.
  # ---------------------------------------------------------------------------
  SheetSyncFunction:
    Type: AWS::Serverless::Function
    Condition: IsProd
    Properties:
      FunctionName: !Sub "grocery-sheet-sync-${Environment}"
      CodeUri: ../lambdas/sheet_sync/
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaRole.Arn
      Layers:
        - !Ref CommonLayer
      Timeout: 60
      Description: >
        Syncs master.xlsx from S3 to Google Sheets on every export.
        Triggered by S3 ObjectCreated event (configured via CLI after deploy).
      Environment:
        Variables:
          GOOGLE_SHEET_ID:       !Ref GoogleSheetId
          GOOGLE_CREDENTIALS_SSM: "grocery-scanner-google-credentials"

  # Allow S3 to invoke SheetSyncFunction.
  # Uses !Sub ARN (not !GetAtt) to avoid circular dependency with ExportsBucket.
  ExportsBucketSheetSyncPermission:
    Type: AWS::Lambda::Permission
    Condition: IsProd
    DependsOn: SheetSyncFunction
    Properties:
      FunctionName: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:grocery-sheet-sync-${Environment}"
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub "arn:aws:s3:::grocery-exports-${Environment}-${AWS::AccountId}"

# =============================================================================
# OUTPUTS
# =============================================================================
Outputs:
  ApiUrl:
    Description: "API Gateway URL"
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"

  ImagesBucket:
    Description: "S3 bucket for receipt images (auto-triggers processor)"
    Value: !Ref ImagesBucket

  ExportsBucket:
    Description: "S3 bucket for master.xlsx and backups (versioning ON)"
    Value: !Ref ExportsBucket

  AlertTopicArn:
    Description: "SNS topic for cost/error alerts"
    Value: !Ref AlertTopic

  FrontendBucketName:
    Description: "S3 bucket hosting the frontend HTML"
    Value: !Ref FrontendBucket

  CloudFrontUrl:
    Description: "CloudFront HTTPS URL for the frontend"
    Value: !Sub "https://${FrontendDistribution.DomainName}"

  CloudFrontDistributionId:
    Description: "CloudFront distribution ID (for cache invalidation)"
    Value: !Ref FrontendDistribution

  CognitoUserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref CognitoUserPool

  CognitoClientId:
    Description: "Cognito App Client ID"
    Value: !Ref CognitoUserPoolClient

  CognitoHostedUiDomain:
    Description: "Cognito Hosted UI base URL"
    Value: !Sub "https://grocery-${Environment}-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com"

  CommonLayerArn:
    Description: "Shared Lambda Layer ARN"
    Value: !Ref CommonLayer
