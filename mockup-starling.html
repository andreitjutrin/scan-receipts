<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt Scanner — Starling Reconciliation Mockup</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=optional" rel="stylesheet">
<style>
:root {
  --bg:#F7F6F3; --surface:#FFFFFF; --surface2:#F0EFEB; --border:#E5E3DC;
  --text:#1A1916; --text2:#6B6860; --text3:#9B9A94;
  --accent:#2A6049; --accent-light:#EAF2EE;
  --warning:#D68910; --warning-light:#FEF9E7;
  --danger:#C0392B; --danger-light:#FDECEA;
  --success:#27AE60; --success-light:#EAFAF1;
  --partial:#0E7490; --partial-light:#ECFEFF;
  --starling:#6C3CE1; --starling-light:#F0EBFF;
  --shadow:0 1px 3px rgba(0,0,0,0.06);
  --radius:10px; --radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:16px}
.logo-text{font-size:15px;font-weight:600;letter-spacing:-0.3px}
.logo-sub{font-size:11px;color:var(--text3)}
.sidebar-nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);font-size:13.5px;font-weight:500;transition:all 0.15s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--starling-light);color:var(--starling)}
.nav-divider{height:1px;background:var(--border);margin:8px 0}
.sidebar-footer{padding:12px 10px;border-top:1px solid var(--border)}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600;flex:1}
.content{flex:1;overflow-y:auto;padding:24px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all 0.15s;white-space:nowrap}
.btn-primary{background:var(--starling);color:white}.btn-primary:hover{background:#5a30c5}
.btn-secondary{background:var(--surface);color:var(--text2);border:1px solid var(--border)}.btn-secondary:hover{background:var(--surface2)}
.btn-sm{padding:5px 10px;font-size:12px}

/* ── Month navigator ── */
.month-nav{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.month-nav button{background:none;border:none;padding:8px 14px;cursor:pointer;color:var(--text2);font-size:16px;transition:background 0.15s}
.month-nav button:hover{background:var(--surface2);color:var(--text)}
.month-nav .month-label{padding:8px 20px;font-size:14px;font-weight:600;min-width:160px;text-align:center;border-left:1px solid var(--border);border-right:1px solid var(--border)}

/* ── 3-card stats row ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow)}
.stat-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.stat-amount{font-size:22px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:-0.5px}
.stat-count{font-size:12px;color:var(--text3);margin-top:3px}
.stat-card.is-receipts{border-color:#A9DFBF;background:var(--success-light)}.stat-card.is-receipts .stat-amount{color:var(--success)}
.stat-card.is-starling .stat-amount{color:var(--starling)}
.stat-card.is-gap{border-color:#F5B7B1;background:var(--danger-light)}.stat-card.is-gap .stat-amount{color:var(--danger)}
.stat-card.is-gap-zero{border-color:#A9DFBF;background:var(--success-light)}.stat-card.is-gap-zero .stat-amount{color:var(--success)}

/* ── Filter bar ── */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.filter-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all 0.15s}
.filter-btn:hover{border-color:var(--starling);color:var(--starling)}
.filter-btn.active{background:var(--starling);border-color:var(--starling);color:white}
.filter-spacer{flex:1}

/* ── Transaction table ── */
.txn-table{width:100%;border-collapse:separate;border-spacing:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.txn-table th{padding:10px 16px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.4px;background:var(--surface2);border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
.txn-table th.right{text-align:right}
.txn-table td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.txn-table tr:last-child td{border-bottom:none}
.txn-table tr:hover td{background:#FAFAF8}

.shop-name{font-weight:600;font-size:13px}
.shop-date{font-size:11px;color:var(--text3);margin-top:2px;font-family:'DM Mono',monospace}

.amount-cell{text-align:right;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;white-space:nowrap}
.amount-cell.muted{color:var(--text3)}

.diff-cell{text-align:right;white-space:nowrap;font-family:'DM Mono',monospace;font-size:13px;font-weight:600}
.diff-matched{color:var(--success)}
.diff-partial{color:var(--partial)}
.diff-unmatched{color:var(--danger)}

/* ── Row highlights ── */
tr.unmatched-row td{background:#FFF8F0}
tr.unmatched-row:hover td{background:#FEF1E0}
tr.partial-row td{background:#F0FBFD}
tr.partial-row:hover td{background:#E3F6FA}

/* ── Starling pill ── */
.starling-pill{display:inline-flex;align-items:center;gap:6px;background:var(--starling-light);color:var(--starling);border:1px solid #C5B3F5;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600}
.starling-dot{width:7px;height:7px;background:var(--starling);border-radius:50%}

/* ── Mockup banner ── */
.mockup-banner{background:#1A1916;color:white;padding:8px 24px;font-size:12px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.mockup-banner strong{color:#FCD34D}

@media(max-width:768px){
  .app{height:auto;min-height:100vh;overflow:visible;flex-direction:column}
  .sidebar{width:100%;height:auto;flex-direction:row;border-right:none;border-bottom:1px solid var(--border)}
  .sidebar-logo{display:none}
  .sidebar-nav{flex-direction:row;padding:6px 8px;overflow-x:auto;gap:4px;flex:none}
  .sidebar-nav .nav-divider{display:none}
  .nav-item{padding:6px 10px;font-size:12px;white-space:nowrap}
  .sidebar-footer{display:none}
  .main{overflow:visible}
  .content{padding:14px}
  .topbar{padding:0 14px;height:auto;min-height:48px;flex-wrap:wrap;gap:6px;padding-top:8px;padding-bottom:8px}
  .stats-row{grid-template-columns:1fr}
  .month-nav .month-label{min-width:120px;font-size:13px}
  .txn-table th, .txn-table td{padding:9px 8px}
  .txn-table .amount-cell{font-size:12px}
  .diff-cell{font-size:12px}
  .shop-name{font-size:12px}
  .shop-date{font-size:10px}
}
</style>
</head>
<body>

<div class="mockup-banner">
  <strong>MOCKUP</strong>
  <span style="color:#9CA3AF">Starling Reconciliation — iterate before implementing</span>
</div>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-icon">🧾</div>
        <div>
          <div class="logo-text">Receipt Scanner</div>
          <div class="logo-sub">andreit@gmail.com</div>
        </div>
      </div>
    </div>
    <div class="sidebar-nav">
      <button class="nav-item">◎ Dashboard</button>
      <button class="nav-item">≡ Receipts</button>
      <button class="nav-item">💳 Expenses</button>
      <button class="nav-item">⊞ Mappings</button>
      <div class="nav-divider"></div>
      <button class="nav-item active">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;background:var(--starling);border-radius:3px;font-size:10px">✦</span>
        Starling
      </button>
    </div>
    <div class="sidebar-footer">
      <button class="nav-item" style="color:var(--text3);font-size:12px">⏏ Sign out</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Starling Reconciliation</div>
      <div class="starling-pill"><div class="starling-dot"></div>Groceries Space</div>
      <span style="font-size:12px;color:var(--text3)">Last synced: today 08:32</span>
      <button class="btn btn-primary btn-sm" onclick="syncNow()">↻ Sync</button>
    </div>

    <div class="content">

      <!-- Month navigator -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px">
        <div class="month-nav">
          <button onclick="prevMonth()">‹</button>
          <div class="month-label" id="month-label">March 2026</div>
          <button onclick="nextMonth()" id="next-btn" disabled style="opacity:0.35;cursor:default">›</button>
        </div>
        <span style="font-size:12px;color:var(--text3)"><strong id="txn-count">12</strong> transactions</span>
      </div>

      <!-- 3 stat cards -->
      <div class="stats-row" id="stats-row"></div>

      <!-- Filter bar -->
      <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setFilter('matched',this)">✓ Matched</button>
        <button class="filter-btn" onclick="setFilter('partial',this)">≈ Partial</button>
        <button class="filter-btn" onclick="setFilter('unmatched',this)">✗ Missing</button>
        <div class="filter-spacer"></div>
        <span style="font-size:12px;color:var(--text3)">Matched by amount + date ±2 days</span>
      </div>

      <!-- Table -->
      <table class="txn-table">
        <thead>
          <tr>
            <th>Shop</th>
            <th class="right">Receipt</th>
            <th class="right">Starling</th>
            <th class="right" style="width:90px">Diff</th>
          </tr>
        </thead>
        <tbody id="txn-body"></tbody>
      </table>

    </div>
  </div>
</div>

<script>
const MONTHS = {
  '2026-03': {
    label: 'March 2026',
    transactions: [
      { date:'12 Mar', merchant:"Sainsbury's", amount:26.43, match:'matched',  receipt_amount:26.43 },
      { date:'09 Mar', merchant:'Tesco',        amount:28.54, match:'partial',  receipt_amount:26.50 },
      { date:'09 Mar', merchant:'Lidl',         amount:14.20, match:'unmatched' },
      { date:'08 Mar', merchant:'Iceland',      amount:22.10, match:'matched',  receipt_amount:22.10 },
      { date:'07 Mar', merchant:'Aldi',         amount:31.75, match:'matched',  receipt_amount:31.75 },
      { date:'07 Mar', merchant:'Tesco Express',amount:6.40,  match:'partial',  receipt_amount:5.95  },
      { date:'05 Mar', merchant:'Morrisons',    amount:19.20, match:'matched',  receipt_amount:19.20 },
      { date:'05 Mar', merchant:'Waitrose',     amount:45.60, match:'unmatched' },
      { date:'03 Mar', merchant:'Aldi',         amount:27.10, match:'matched',  receipt_amount:27.10 },
      { date:'02 Mar', merchant:"Sainsbury's",  amount:18.90, match:'partial',  receipt_amount:17.45 },
      { date:'01 Mar', merchant:'Tesco',        amount:15.30, match:'matched',  receipt_amount:15.30 },
      { date:'01 Mar', merchant:'Lidl',         amount:23.45, match:'unmatched' },
    ]
  },
  '2026-02': {
    label: 'February 2026',
    transactions: [
      { date:'28 Feb', merchant:'Tesco',        amount:32.10, match:'matched',   receipt_amount:32.10 },
      { date:'25 Feb', merchant:'Lidl',         amount:18.55, match:'matched',   receipt_amount:18.55 },
      { date:'22 Feb', merchant:'Aldi',         amount:41.20, match:'unmatched' },
      { date:'18 Feb', merchant:'Iceland',      amount:14.90, match:'partial',   receipt_amount:13.50 },
      { date:'15 Feb', merchant:"Sainsbury's",  amount:27.35, match:'matched',   receipt_amount:27.35 },
      { date:'10 Feb', merchant:'Tesco',        amount:19.80, match:'matched',   receipt_amount:19.80 },
      { date:'05 Feb', merchant:'Waitrose',     amount:53.40, match:'unmatched' },
      { date:'02 Feb', merchant:'Lidl',         amount:22.60, match:'matched',   receipt_amount:22.60 },
    ]
  }
};

const MONTH_KEYS = ['2026-02','2026-03'];
let currentIdx    = 1;
let currentFilter = 'all';

function renderMonth() {
  const key  = MONTH_KEYS[currentIdx];
  const data = MONTHS[key];
  const txns = data.transactions;

  document.getElementById('month-label').textContent = data.label;
  document.getElementById('txn-count').textContent   = txns.length;
  const nextBtn = document.getElementById('next-btn');
  const atEnd   = currentIdx === MONTH_KEYS.length - 1;
  nextBtn.disabled     = atEnd;
  nextBtn.style.opacity = atEnd ? '0.35' : '1';
  nextBtn.style.cursor  = atEnd ? 'default' : 'pointer';

  const matched       = txns.filter(t => t.match === 'matched').length;
  const partial       = txns.filter(t => t.match === 'partial').length;
  const unmatched     = txns.filter(t => t.match === 'unmatched').length;
  const starlingTotal = txns.reduce((s,t) => s + t.amount, 0);
  const receiptsTotal = txns.filter(t => t.receipt_amount != null).reduce((s,t) => s + t.receipt_amount, 0);
  const gap           = starlingTotal - receiptsTotal;
  const missingCount  = unmatched;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card is-receipts">
      <div class="stat-label">🧾 Receipts captured</div>
      <div class="stat-amount">£${receiptsTotal.toFixed(2)}</div>
      <div class="stat-count">${matched + partial} receipt${matched+partial!==1?'s':''} matched</div>
    </div>
    <div class="stat-card is-starling">
      <div class="stat-label">✦ Starling spent</div>
      <div class="stat-amount">£${starlingTotal.toFixed(2)}</div>
      <div class="stat-count">${txns.length} transaction${txns.length!==1?'s':''}</div>
    </div>
    <div class="stat-card ${gap > 0.005 ? 'is-gap' : 'is-gap-zero'}">
      <div class="stat-label">Gap</div>
      <div class="stat-amount">${gap > 0.005 ? '−£'+gap.toFixed(2) : '£0.00'}</div>
      <div class="stat-count">${missingCount} receipt${missingCount!==1?'s':''} missing</div>
    </div>
  `;

  // update filter buttons
  document.querySelectorAll('.filter-btn').forEach(b => {
    const f = b.getAttribute('onclick')?.match(/setFilter\('(\w+)'/)?.[1];
    const map = {all:`All (${txns.length})`, matched:`✓ Matched (${matched})`, partial:`≈ Partial (${partial})`, unmatched:`✗ Missing (${unmatched})`};
    if (map[f]) b.textContent = map[f];
    b.classList.toggle('active', f === currentFilter);
  });

  renderRows(txns);
}

function renderRows(txns) {
  const filtered = currentFilter === 'all' ? txns : txns.filter(t => t.match === currentFilter);
  const tbody    = document.getElementById('txn-body');

  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:40px;color:var(--text3)">No transactions</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(t => {
    let rowClass    = '';
    let receiptCell = '';
    let diffCell    = '';

    if (t.match === 'matched') {
      receiptCell = `<span class="amount-cell">£${t.receipt_amount.toFixed(2)}</span>`;
      diffCell    = `<span class="diff-cell diff-matched">✓</span>`;

    } else if (t.match === 'partial') {
      const diff    = t.amount - t.receipt_amount;
      const sign    = diff > 0 ? '−' : '+';
      const diffStr = sign + '£' + Math.abs(diff).toFixed(2);
      rowClass    = 'partial-row';
      receiptCell = `<span class="amount-cell" style="color:var(--partial)">£${t.receipt_amount.toFixed(2)}</span>`;
      diffCell    = `<span class="diff-cell diff-partial">${diffStr}</span>`;

    } else {
      rowClass    = 'unmatched-row';
      receiptCell = `<span class="amount-cell muted">—</span>`;
      diffCell    = `<span class="diff-cell diff-unmatched">−£${t.amount.toFixed(2)}</span>`;
    }

    return `
      <tr class="${rowClass}">
        <td>
          <div class="shop-name">${t.merchant}</div>
          <div class="shop-date">${t.date}</div>
        </td>
        <td style="text-align:right">${receiptCell}</td>
        <td style="text-align:right"><span class="amount-cell">£${t.amount.toFixed(2)}</span></td>
        <td style="text-align:right">${diffCell}</td>
      </tr>`;
  }).join('');
}

function prevMonth() { if (currentIdx > 0) { currentIdx--; renderMonth(); } }
function nextMonth() { if (currentIdx < MONTH_KEYS.length-1) { currentIdx++; renderMonth(); } }
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderRows(MONTHS[MONTH_KEYS[currentIdx]].transactions);
}
function syncNow() {
  const btn = document.querySelector('.btn-primary');
  btn.textContent = '↻ Syncing…'; btn.disabled = true;
  setTimeout(() => { btn.textContent = '↻ Sync'; btn.disabled = false; }, 1200);
}

renderMonth();
</script>
</body>
</html>
